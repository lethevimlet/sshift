<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Tab Drag Active State</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      padding: 20px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 {
      color: #4CAF50;
    }
    .test-section {
      margin: 20px 0;
      padding: 15px;
      background: #2a2a2a;
      border-radius: 8px;
    }
    .test-result {
      margin: 10px 0;
      padding: 10px;
      border-radius: 4px;
    }
    .pass {
      background: #1b5e20;
      color: #a5d6a7;
    }
    .fail {
      background: #b71c1c;
      color: #ef9a9a;
    }
    .info {
      background: #0d47a1;
      color: #90caf9;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #45a049;
    }
    #testOutput {
      margin-top: 20px;
      padding: 15px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      font-family: monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Tab Drag Active State Test</h1>
  
  <div class="test-section">
    <h2>Test Description</h2>
    <p>This test verifies that when dragging a tab from one panel to another:</p>
    <ul>
      <li>The dragged tab becomes active in the target panel</li>
      <li>The source panel activates its first remaining tab</li>
      <li>Each panel maintains exactly one active tab</li>
    </ul>
  </div>

  <div class="test-section">
    <h2>Automated Tests</h2>
    <button onclick="runTests()">Run Tests</button>
    <button onclick="clearOutput()">Clear Output</button>
    <div id="testOutput"></div>
  </div>

  <script>
    // Mock app for testing
    class MockApp {
      constructor() {
        this.sessions = new Map();
        this.sftpSessions = new Map();
        this.activeSessionId = null;
        this.activeSessionsByPanel = new Map();
        this.currentLayout = { id: 'columns-2', name: '2 Columns' };
      }

      getAllPanels() {
        const layoutContainer = document.getElementById('layoutContainer');
        if (!layoutContainer) return ['panel-0'];
        
        const panels = [];
        layoutContainer.querySelectorAll('.panel').forEach(panel => {
          panels.push(panel.id);
        });
        
        return panels.length > 0 ? panels : ['panel-0'];
      }

      getTabsContainer(panelId) {
        if (panelId === 'panel-0') {
          return document.getElementById('tabs');
        }
        return document.getElementById(`${panelId}-tabs`);
      }

      getTerminalsContainer(panelId) {
        if (panelId === 'panel-0') {
          return document.getElementById('terminals');
        }
        return document.getElementById(`${panelId}-terminals`);
      }

      getPanelForSession(sessionId) {
        const panels = this.getAllPanels();
        for (const panelId of panels) {
          const tabsContainer = this.getTabsContainer(panelId);
          if (tabsContainer) {
            const tab = tabsContainer.querySelector(`[data-session-id="${sessionId}"]`);
            if (tab) return panelId;
          }
        }
        return 'panel-0';
      }

      hideEmptyState(panelId) {
        const emptyState = document.getElementById(panelId === 'panel-0' ? 'emptyState' : `${panelId}-emptyState`);
        if (emptyState) {
          emptyState.style.display = 'none';
        }
      }

      showEmptyState(panelId) {
        const emptyState = document.getElementById(panelId === 'panel-0' ? 'emptyState' : `${panelId}-emptyState`);
        if (emptyState) {
          emptyState.style.display = 'flex';
        }
      }

      switchTab(sessionId, panelId = null) {
        // Determine which panel this session belongs to
        if (!panelId) {
          panelId = this.getPanelForSession(sessionId);
        }
        
        // Update per-panel active session
        this.activeSessionsByPanel.set(panelId, sessionId);
        
        // Update global active session (for backwards compatibility)
        this.activeSessionId = sessionId;
        
        // Get the tabs container for this panel
        const tabsContainer = this.getTabsContainer(panelId);
        if (tabsContainer) {
          // Update active tab only within this panel
          tabsContainer.querySelectorAll('.tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.sessionId === sessionId);
          });
        }

        // Get the terminals container for this panel
        const terminalsContainer = this.getTerminalsContainer(panelId);
        if (terminalsContainer) {
          // Update active terminal only within this panel
          terminalsContainer.querySelectorAll('.terminal-wrapper').forEach(wrapper => {
            const isActive = wrapper.id === `terminal-wrapper-${sessionId}`;
            wrapper.classList.toggle('active', isActive);
          });
        }
      }

      moveTabToPanel(sessionId, targetPanelId) {
        const currentPanelId = this.getPanelForSession(sessionId);
        if (currentPanelId === targetPanelId) return; // Already in target panel
        
        const sourceTabsContainer = this.getTabsContainer(currentPanelId);
        const targetTabsContainer = this.getTabsContainer(targetPanelId);
        const sourceTerminalsContainer = this.getTerminalsContainer(currentPanelId);
        const targetTerminalsContainer = this.getTerminalsContainer(targetPanelId);
        
        if (!sourceTabsContainer || !targetTabsContainer) return;
        if (!sourceTerminalsContainer || !targetTerminalsContainer) return;
        
        // Move tab element
        const tabElement = sourceTabsContainer.querySelector(`[data-session-id="${sessionId}"]`);
        if (tabElement) {
          targetTabsContainer.appendChild(tabElement);
        }
        
        // Move terminal element
        const terminalElement = sourceTerminalsContainer.querySelector(`[data-session-id="${sessionId}"]`);
        if (terminalElement) {
          targetTerminalsContainer.appendChild(terminalElement);
        }
        
        // Hide empty state in target panel if it has tabs now
        const targetTabs = targetTabsContainer.children;
        if (targetTabs.length > 0) {
          this.hideEmptyState(targetPanelId);
        }
        
        // Show empty state in source panel if it has no tabs now
        const sourceTabs = sourceTabsContainer.children;
        if (sourceTabs.length === 0) {
          this.showEmptyState(currentPanelId);
        }
        
        // Update active sessions:
        // 1. Make the moved tab active in the target panel
        this.switchTab(sessionId, targetPanelId);
        
        // 2. Activate the first remaining tab in the source panel (if any)
        if (sourceTabs.length > 0) {
          const firstRemainingSessionId = sourceTabs[0].dataset.sessionId;
          this.switchTab(firstRemainingSessionId, currentPanelId);
        } else {
          // No tabs left in source panel, clear its active session
          this.activeSessionsByPanel.delete(currentPanelId);
        }
        
        console.log('[TEST] Moved tab', sessionId, 'from', currentPanelId, 'to', targetPanelId);
      }
    }

    let app;
    let testOutput;

    function log(message, type = 'info') {
      const div = document.createElement('div');
      div.className = `test-result ${type}`;
      div.textContent = message;
      testOutput.appendChild(div);
    }

    function clearOutput() {
      testOutput.innerHTML = '';
    }

    function setupTestDOM() {
      // Create layout container
      const layoutContainer = document.createElement('div');
      layoutContainer.id = 'layoutContainer';
      layoutContainer.className = 'layout-container';
      
      // Create panel-0
      const panel0 = document.createElement('div');
      panel0.id = 'panel-0';
      panel0.className = 'panel';
      
      const tabs0 = document.createElement('div');
      tabs0.id = 'tabs';
      tabs0.className = 'tabs';
      
      const terminals0 = document.createElement('div');
      terminals0.id = 'terminals';
      terminals0.className = 'terminals-container';
      
      const emptyState0 = document.createElement('div');
      emptyState0.id = 'emptyState';
      emptyState0.className = 'empty-state';
      emptyState0.style.display = 'none';
      
      // Create panel-1
      const panel1 = document.createElement('div');
      panel1.id = 'panel-1';
      panel1.className = 'panel';
      
      const tabs1 = document.createElement('div');
      tabs1.id = 'panel-1-tabs';
      tabs1.className = 'tabs';
      
      const terminals1 = document.createElement('div');
      terminals1.id = 'panel-1-terminals';
      terminals1.className = 'terminals-container';
      
      const emptyState1 = document.createElement('div');
      emptyState1.id = 'panel-1-emptyState';
      emptyState1.className = 'empty-state';
      emptyState1.style.display = 'none';
      
      panel0.appendChild(tabs0);
      panel0.appendChild(terminals0);
      panel0.appendChild(emptyState0);
      panel1.appendChild(tabs1);
      panel1.appendChild(terminals1);
      panel1.appendChild(emptyState1);
      
      layoutContainer.appendChild(panel0);
      layoutContainer.appendChild(panel1);
      
      document.body.appendChild(layoutContainer);
      
      return { layoutContainer, panel0, panel1, tabs0, tabs1, terminals0, terminals1 };
    }

    function cleanupTestDOM() {
      const layoutContainer = document.getElementById('layoutContainer');
      if (layoutContainer) layoutContainer.remove();
    }

    function createMockSession(id, name) {
      // Create tab element
      const tab = document.createElement('div');
      tab.className = 'tab';
      tab.dataset.sessionId = id;
      tab.textContent = name;
      
      // Create terminal wrapper
      const wrapper = document.createElement('div');
      wrapper.className = 'terminal-wrapper';
      wrapper.id = `terminal-wrapper-${id}`;
      wrapper.dataset.sessionId = id;
      wrapper.textContent = `Terminal ${name}`;
      
      return { tab, wrapper };
    }

    async function runTests() {
      testOutput = document.getElementById('testOutput');
      clearOutput();
      
      log('Starting Tab Drag Active State Tests', 'info');
      log('='.repeat(50), 'info');
      
      let passed = 0;
      let failed = 0;
      
      try {
        // Setup
        cleanupTestDOM();
        const dom = setupTestDOM();
        app = new MockApp();
        
        // Test 1: Create 3 sessions in panel-0
        log('Test 1: Setup - Create 3 sessions in panel-0', 'info');
        
        const session1 = createMockSession('session-1', 'Server 1');
        const session2 = createMockSession('session-2', 'Server 2');
        const session3 = createMockSession('session-3', 'Server 3');
        
        dom.tabs0.appendChild(session1.tab);
        dom.tabs0.appendChild(session2.tab);
        dom.tabs0.appendChild(session3.tab);
        dom.terminals0.appendChild(session1.wrapper);
        dom.terminals0.appendChild(session2.wrapper);
        dom.terminals0.appendChild(session3.wrapper);
        
        app.sessions.set('session-1', { id: 'session-1', name: 'Server 1' });
        app.sessions.set('session-2', { id: 'session-2', name: 'Server 2' });
        app.sessions.set('session-3', { id: 'session-3', name: 'Server 3' });
        
        // Activate session-1 in panel-0
        app.switchTab('session-1', 'panel-0');
        
        const activeInPanel0 = app.activeSessionsByPanel.get('panel-0');
        if (activeInPanel0 === 'session-1') {
          log('✓ PASS: Panel-0 has session-1 active', 'pass');
          passed++;
        } else {
          log(`✗ FAIL: Expected session-1 active, got ${activeInPanel0}`, 'fail');
          failed++;
        }
        
        // Test 2: Move session-1 from panel-0 to panel-1
        log('Test 2: Move session-1 from panel-0 to panel-1', 'info');
        
        app.moveTabToPanel('session-1', 'panel-1');
        
        // Check that session-1 is now active in panel-1
        const activeInPanel1AfterMove = app.activeSessionsByPanel.get('panel-1');
        if (activeInPanel1AfterMove === 'session-1') {
          log('✓ PASS: Moved tab (session-1) is active in target panel (panel-1)', 'pass');
          passed++;
        } else {
          log(`✗ FAIL: Expected session-1 active in panel-1, got ${activeInPanel1AfterMove}`, 'fail');
          failed++;
        }
        
        // Check that panel-0 has a new active tab (should be session-2, the first remaining)
        const activeInPanel0AfterMove = app.activeSessionsByPanel.get('panel-0');
        if (activeInPanel0AfterMove === 'session-2') {
          log('✓ PASS: Source panel (panel-0) activated first remaining tab (session-2)', 'pass');
          passed++;
        } else {
          log(`✗ FAIL: Expected session-2 active in panel-0, got ${activeInPanel0AfterMove}`, 'fail');
          failed++;
        }
        
        // Test 3: Verify only one active tab per panel
        log('Test 3: Verify exactly one active tab per panel', 'info');
        
        const activeTabsPanel0 = dom.tabs0.querySelectorAll('.tab.active');
        const activeTabsPanel1 = dom.tabs1.querySelectorAll('.tab.active');
        const activeTerminalsPanel0 = dom.terminals0.querySelectorAll('.terminal-wrapper.active');
        const activeTerminalsPanel1 = dom.terminals1.querySelectorAll('.terminal-wrapper.active');
        
        if (activeTabsPanel0.length === 1 && activeTabsPanel1.length === 1) {
          log('✓ PASS: Each panel has exactly one active tab', 'pass');
          passed++;
        } else {
          log(`✗ FAIL: Panel-0 has ${activeTabsPanel0.length} active tabs, Panel-1 has ${activeTabsPanel1.length} active tabs`, 'fail');
          failed++;
        }
        
        if (activeTerminalsPanel0.length === 1 && activeTerminalsPanel1.length === 1) {
          log('✓ PASS: Each panel has exactly one active terminal', 'pass');
          passed++;
        } else {
          log(`✗ FAIL: Panel-0 has ${activeTerminalsPanel0.length} active terminals, Panel-1 has ${activeTerminalsPanel1.length} active terminals`, 'fail');
          failed++;
        }
        
        // Test 4: Move session-2 from panel-0 to panel-1
        log('Test 4: Move session-2 from panel-0 to panel-1', 'info');
        
        app.moveTabToPanel('session-2', 'panel-1');
        
        // Check that session-2 is now active in panel-1
        const activeInPanel1AfterSecondMove = app.activeSessionsByPanel.get('panel-1');
        if (activeInPanel1AfterSecondMove === 'session-2') {
          log('✓ PASS: Moved tab (session-2) is active in target panel (panel-1)', 'pass');
          passed++;
        } else {
          log(`✗ FAIL: Expected session-2 active in panel-1, got ${activeInPanel1AfterSecondMove}`, 'fail');
          failed++;
        }
        
        // Check that panel-0 has session-3 active (the only remaining tab)
        const activeInPanel0AfterSecondMove = app.activeSessionsByPanel.get('panel-0');
        if (activeInPanel0AfterSecondMove === 'session-3') {
          log('✓ PASS: Source panel (panel-0) activated first remaining tab (session-3)', 'pass');
          passed++;
        } else {
          log(`✗ FAIL: Expected session-3 active in panel-0, got ${activeInPanel0AfterSecondMove}`, 'fail');
          failed++;
        }
        
        // Test 5: Move last tab from panel-0 to panel-1
        log('Test 5: Move last tab (session-3) from panel-0 to panel-1', 'info');
        
        app.moveTabToPanel('session-3', 'panel-1');
        
        // Check that session-3 is now active in panel-1
        const activeInPanel1AfterThirdMove = app.activeSessionsByPanel.get('panel-1');
        if (activeInPanel1AfterThirdMove === 'session-3') {
          log('✓ PASS: Moved tab (session-3) is active in target panel (panel-1)', 'pass');
          passed++;
        } else {
          log(`✗ FAIL: Expected session-3 active in panel-1, got ${activeInPanel1AfterThirdMove}`, 'fail');
          failed++;
        }
        
        // Check that panel-0 has no active session
        const activeInPanel0AfterThirdMove = app.activeSessionsByPanel.get('panel-0');
        if (activeInPanel0AfterThirdMove === undefined) {
          log('✓ PASS: Source panel (panel-0) has no active session (empty panel)', 'pass');
          passed++;
        } else {
          log(`✗ FAIL: Expected no active session in panel-0, got ${activeInPanel0AfterThirdMove}`, 'fail');
          failed++;
        }
        
        // Test 6: Verify all tabs are in panel-1
        log('Test 6: Verify all tabs are now in panel-1', 'info');
        
        const tabsInPanel0 = dom.tabs0.children.length;
        const tabsInPanel1 = dom.tabs1.children.length;
        
        if (tabsInPanel0 === 0 && tabsInPanel1 === 3) {
          log('✓ PASS: All tabs moved to panel-1, panel-0 is empty', 'pass');
          passed++;
        } else {
          log(`✗ FAIL: Panel-0 has ${tabsInPanel0} tabs, Panel-1 has ${tabsInPanel1} tabs`, 'fail');
          failed++;
        }
        
        // Cleanup
        cleanupTestDOM();
        
      } catch (error) {
        log(`✗ ERROR: ${error.message}`, 'fail');
        console.error(error);
        cleanupTestDOM();
      }
      
      // Summary
      log('='.repeat(50), 'info');
      log(`Tests Complete: ${passed} passed, ${failed} failed`, failed === 0 ? 'pass' : 'fail');
      
      if (failed === 0) {
        log('🎉 All tests passed!', 'pass');
      } else {
        log('⚠️ Some tests failed. Please review the implementation.', 'fail');
      }
    }
  </script>
</body>
</html>
