<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empty State Flex Direction Test</title>
  <link rel="stylesheet" href="../webapp/css/style.css">
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg-primary, #1a1a1a);
      color: var(--text-primary, #e0e0e0);
    }
    
    .test-container {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .test-panel {
      position: relative;
      width: 400px;
      height: 500px;
      border: 1px solid var(--border-color, #333);
      border-radius: 8px;
      background: var(--bg-secondary, #242424);
    }
    
    .test-panel-title {
      padding: 10px;
      background: var(--bg-tertiary, #2a2a2a);
      border-bottom: 1px solid var(--border-color, #333);
      font-weight: 600;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: var(--accent-primary, #4a9eff);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover, #3a8eef);
    }
    
    .status {
      margin-top: 20px;
      padding: 10px;
      background: var(--bg-tertiary, #2a2a2a);
      border-radius: 4px;
    }
    
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
  </style>
</head>
<body>
  <h1>Empty State Flex Direction Test</h1>
  <p>This test verifies that the empty state message displays correctly with flex-direction: column</p>
  
  <div class="test-container">
    <div class="test-panel">
      <div class="test-panel-title">Initial Empty State</div>
      <div class="empty-state" id="emptyState1">
        <i class="fas fa-terminal"></i>
        <h3>No Active Sessions</h3>
        <p>Connect to a server using SSH or SFTP</p>
        <div class="empty-actions">
          <button class="btn btn-primary">
            <i class="fas fa-plug"></i> Quick SSH
          </button>
          <button class="btn btn-primary">
            <i class="fas fa-folder-open"></i> Quick SFTP
          </button>
        </div>
      </div>
    </div>
    
    <div class="test-panel">
      <div class="test-panel-title">Toggled Empty State</div>
      <div class="empty-state hidden" id="emptyState2">
        <i class="fas fa-terminal"></i>
        <h3>No Active Sessions</h3>
        <p>Connect to a server using SSH or SFTP</p>
        <div class="empty-actions">
          <button class="btn btn-primary">
            <i class="fas fa-plug"></i> Quick SSH
          </button>
          <button class="btn btn-primary">
            <i class="fas fa-folder-open"></i> Quick SFTP
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <button class="btn btn-primary" onclick="toggleEmptyState()">Toggle Empty State</button>
  
  <div class="status" id="status"></div>
  
  <script>
    function toggleEmptyState() {
      const emptyState = document.getElementById('emptyState2');
      emptyState.classList.toggle('hidden');
      checkLayout();
    }
    
    function checkLayout() {
      const emptyState1 = document.getElementById('emptyState1');
      const emptyState2 = document.getElementById('emptyState2');
      const status = document.getElementById('status');
      
      const computedStyle1 = window.getComputedStyle(emptyState1);
      const computedStyle2 = window.getComputedStyle(emptyState2);
      
      let results = [];
      
      // Check empty state 1 (visible)
      if (computedStyle1.display === 'flex') {
        results.push('✓ Empty State 1: display is flex');
      } else {
        results.push('✗ Empty State 1: display is ' + computedStyle1.display + ' (expected flex)');
      }
      
      if (computedStyle1.flexDirection === 'column') {
        results.push('✓ Empty State 1: flex-direction is column');
      } else {
        results.push('✗ Empty State 1: flex-direction is ' + computedStyle1.flexDirection + ' (expected column)');
      }
      
      if (computedStyle1.alignItems === 'center') {
        results.push('✓ Empty State 1: align-items is center');
      } else {
        results.push('✗ Empty State 1: align-items is ' + computedStyle1.alignItems + ' (expected center)');
      }
      
      // Check empty state 2 (may be hidden)
      if (emptyState2.classList.contains('hidden')) {
        results.push('✓ Empty State 2: is hidden');
      } else {
        if (computedStyle2.display === 'flex') {
          results.push('✓ Empty State 2: display is flex');
        } else {
          results.push('✗ Empty State 2: display is ' + computedStyle2.display + ' (expected flex)');
        }
        
        if (computedStyle2.flexDirection === 'column') {
          results.push('✓ Empty State 2: flex-direction is column');
        } else {
          results.push('✗ Empty State 2: flex-direction is ' + computedStyle2.flexDirection + ' (expected column)');
        }
      }
      
      status.innerHTML = results.join('<br>');
    }
    
    // Check layout on load
    window.addEventListener('load', checkLayout);
  </script>
</body>
</html>
