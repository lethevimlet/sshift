<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Terminal Test</title>
  <link rel="stylesheet" href="https://unpkg.com/xterm@5.3.0/css/xterm.css">
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0d1117;
      color: #e6edf3;
      font-family: monospace;
    }
    h1 { color: #58a6ff; }
    #terminal-container {
      width: 100%;
      height: 400px;
      border: 2px solid #30363d;
      background: #0d1117;
    }
    .log {
      margin-top: 20px;
      padding: 10px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-entry { margin: 4px 0; }
    .error { color: #f85149; }
    .success { color: #3fb950; }
    .info { color: #58a6ff; }
  </style>
</head>
<body>
  <h1>Simple Terminal Test</h1>
  <div id="terminal-container"></div>
  <div class="log" id="log"></div>

  <script src="https://unpkg.com/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://unpkg.com/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script>
    const logEl = document.getElementById('log');
    
    function log(msg, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(`[${type}] ${msg}`);
    }

    window.onerror = function(msg, url, line, col, error) {
      log(`Error: ${msg} at ${url}:${line}:${col}`, 'error');
      if (error && error.stack) {
        log(`Stack: ${error.stack}`, 'error');
      }
      return false;
    };

    log('Starting test...', 'info');

    try {
      log('Checking Terminal class...', 'info');
      if (typeof Terminal === 'undefined') {
        throw new Error('Terminal class is undefined - xterm.js not loaded');
      }
      log('✓ Terminal class available', 'success');

      log('Checking FitAddon...', 'info');
      if (typeof FitAddon === 'undefined') {
        throw new Error('FitAddon is undefined - addon not loaded');
      }
      log('✓ FitAddon available', 'success');

      log('Creating Terminal instance...', 'info');
      const terminal = new Terminal({
        theme: {
          background: '#0d1117',
          foreground: '#e6edf3'
        },
        fontFamily: 'monospace',
        fontSize: 14,
        cursorBlink: true
      });
      log('✓ Terminal instance created', 'success');

      log('Creating FitAddon instance...', 'info');
      const fitAddon = new FitAddon();
      log('✓ FitAddon instance created', 'success');

      log('Loading FitAddon into Terminal...', 'info');
      terminal.loadAddon(fitAddon);
      log('✓ FitAddon loaded', 'success');

      const container = document.getElementById('terminal-container');
      log(`Container dimensions: ${container.offsetWidth}x${container.offsetHeight}`, 'info');

      log('Opening terminal in container...', 'info');
      terminal.open(container);
      log('✓ Terminal opened', 'success');

      log('Fitting terminal...', 'info');
      fitAddon.fit();
      log(`✓ Terminal fitted: ${terminal.cols}x${terminal.rows}`, 'success');

      log('Writing test content...', 'info');
      terminal.writeln('\x1b[32m✓ Terminal is working!\x1b[0m');
      terminal.writeln('');
      terminal.writeln('This is a test terminal.');
      terminal.writeln('If you can see this, xterm.js is functioning correctly.');
      terminal.writeln('');
      terminal.write('$ ');
      log('✓ Test content written', 'success');

      log('', 'info');
      log('=== ALL TESTS PASSED ===', 'success');

    } catch (err) {
      log(`✗ Error: ${err.message}`, 'error');
      if (err.stack) {
        log(`Stack trace:`, 'error');
        log(err.stack, 'error');
      }
    }
  </script>
</body>
</html>
