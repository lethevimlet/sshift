<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SSHIFT Connection Test</title>
  <link rel="stylesheet" href="/libs/xterm/xterm.css">
  <link rel="stylesheet" href="/libs/font-awesome/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { padding: 20px; background: var(--bg-primary); }
    .test-container { max-width: 1200px; margin: 0 auto; }
    .test-section { margin-bottom: 30px; padding: 20px; background: var(--bg-secondary); border-radius: 8px; }
    .test-title { color: var(--accent-primary); margin-bottom: 15px; }
    .test-result { padding: 10px; margin: 5px 0; border-radius: 4px; font-family: monospace; }
    .success { background: rgba(63, 185, 80, 0.2); color: #3fb950; }
    .error { background: rgba(248, 81, 73, 0.2); color: #f85149; }
    .warning { background: rgba(210, 153, 34, 0.2); color: #d29922; }
    .info { background: rgba(88, 166, 255, 0.2); color: #58a6ff; }
    #terminal { width: 100%; height: 400px; border: 2px solid var(--accent-primary); }
    .log { max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="test-container">
    <h1 class="test-title">SSHIFT Connection Test</h1>
    
    <div class="test-section">
      <h2>Library Loading Test</h2>
      <div id="library-test"></div>
    </div>
    
    <div class="test-section">
      <h2>Socket.IO Connection Test</h2>
      <div id="socket-test"></div>
    </div>
    
    <div class="test-section">
      <h2>Terminal Initialization Test</h2>
      <div id="terminal-test"></div>
      <div id="terminal"></div>
    </div>
    
    <div class="test-section">
      <h2>SSH Connection Test</h2>
      <div id="ssh-test"></div>
      <button class="btn btn-primary" onclick="testSSH()">Test SSH Connection</button>
    </div>
    
    <div class="test-section">
      <h2>Console Log</h2>
      <div id="console-log" class="log"></div>
    </div>
  </div>

  <script src="/libs/xterm/xterm.js"></script>
  <script src="/libs/xterm/xterm-addon-fit.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  
  <script>
    const consoleLog = document.getElementById('console-log');
    const originalConsole = { ...console };
    
    // Intercept console methods
    ['log', 'error', 'warn', 'info'].forEach(method => {
      console[method] = function(...args) {
        const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : a).join(' ');
        const div = document.createElement('div');
        div.className = `test-result ${method === 'error' ? 'error' : method === 'warn' ? 'warning' : 'info'}`;
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        consoleLog.appendChild(div);
        consoleLog.scrollTop = consoleLog.scrollHeight;
        originalConsole[method](...args);
      };
    });
    
    function addResult(containerId, message, type = 'info') {
      const container = document.getElementById(containerId);
      const div = document.createElement('div');
      div.className = `test-result ${type}`;
      div.textContent = message;
      container.appendChild(div);
    }
    
    // Test 1: Library Loading
    console.log('=== Testing Library Loading ===');
    
    setTimeout(() => {
      // Check Terminal
      console.log('Checking Terminal...');
      console.log('typeof window.Terminal:', typeof window.Terminal);
      
      if (typeof window.Terminal === 'function') {
        addResult('library-test', '✓ Terminal class loaded correctly', 'success');
      } else if (typeof window.Terminal === 'object' && window.Terminal !== null) {
        console.log('Terminal is object, keys:', Object.keys(window.Terminal));
        if (window.Terminal.Terminal) {
          window.Terminal = window.Terminal.Terminal;
          addResult('library-test', '✓ Terminal normalized from object', 'success');
        } else {
          addResult('library-test', '✗ Terminal is object but no .Terminal property', 'error');
        }
      } else {
        addResult('library-test', '✗ Terminal not loaded', 'error');
      }
      
      // Check FitAddon
      console.log('Checking FitAddon...');
      console.log('typeof window.FitAddon:', typeof window.FitAddon);
      
      if (typeof window.FitAddon === 'function') {
        addResult('library-test', '✓ FitAddon class loaded correctly', 'success');
      } else if (typeof window.FitAddon === 'object' && window.FitAddon !== null) {
        console.log('FitAddon is object, keys:', Object.keys(window.FitAddon));
        if (window.FitAddon.FitAddon) {
          window.FitAddon = window.FitAddon.FitAddon;
          addResult('library-test', '✓ FitAddon normalized from object', 'success');
        } else {
          addResult('library-test', '✗ FitAddon is object but no .FitAddon property', 'error');
        }
      } else {
        addResult('library-test', '✗ FitAddon not loaded', 'error');
      }
      
      // Test 2: Socket.IO Connection
      console.log('=== Testing Socket.IO Connection ===');
      
      try {
        const socket = io({
          transports: ['websocket', 'polling'],
          reconnection: true,
          reconnectionAttempts: 5,
          reconnectionDelay: 1000
        });
        
        socket.on('connect', () => {
          console.log('Socket connected, ID:', socket.id);
          addResult('socket-test', '✓ Socket.IO connected (ID: ' + socket.id + ')', 'success');
        });
        
        socket.on('connect_error', (error) => {
          console.error('Socket connection error:', error);
          addResult('socket-test', '✗ Socket.IO connection error: ' + error.message, 'error');
        });
        
        socket.on('disconnect', (reason) => {
          console.log('Socket disconnected:', reason);
          addResult('socket-test', '⚠ Socket.IO disconnected: ' + reason, 'warning');
        });
        
        // Test 3: Terminal Initialization
        console.log('=== Testing Terminal Initialization ===');
        
        setTimeout(() => {
          try {
            if (typeof window.Terminal !== 'function') {
              throw new Error('Terminal class not available');
            }
            
            if (typeof window.FitAddon !== 'function') {
              throw new Error('FitAddon class not available');
            }
            
            const terminal = new window.Terminal({
              theme: {
                background: '#0d1117',
                foreground: '#e6edf3',
                cursor: '#c10059'
              },
              fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
              fontSize: 14,
              cursorBlink: true
            });
            
            const container = document.getElementById('terminal');
            terminal.open(container);
            
            const fitAddon = new window.FitAddon();
            terminal.loadAddon(fitAddon);
            fitAddon.fit();
            
            terminal.writeln('\x1b[36m=== Terminal Test Successful ===\x1b[0m');
            terminal.writeln('');
            terminal.writeln('\x1b[32m✓ Terminal initialized\x1b[0m');
            terminal.writeln('\x1b[32m✓ FitAddon loaded\x1b[0m');
            terminal.writeln('\x1b[32m✓ Terminal fitted\x1b[0m');
            terminal.writeln('');
            terminal.writeln(`Terminal size: ${terminal.cols} cols x ${terminal.rows} rows`);
            terminal.writeln('');
            terminal.write('$ ');
            
            addResult('terminal-test', '✓ Terminal initialized successfully', 'success');
            addResult('terminal-test', `Size: ${terminal.cols} cols x ${terminal.rows} rows`, 'info');
            
          } catch (error) {
            console.error('Terminal initialization error:', error);
            addResult('terminal-test', '✗ Terminal initialization failed: ' + error.message, 'error');
          }
        }, 500);
        
      } catch (error) {
        console.error('Socket.IO error:', error);
        addResult('socket-test', '✗ Socket.IO error: ' + error.message, 'error');
      }
    }, 100);
    
    // Test SSH Connection
    function testSSH() {
      console.log('=== Testing SSH Connection ===');
      addResult('ssh-test', 'Attempting SSH connection...', 'info');
      
      // This would require actual SSH credentials
      addResult('ssh-test', 'SSH test requires valid credentials', 'warning');
      addResult('ssh-test', 'Use the main app to test SSH connections', 'info');
    }
  </script>
</body>
</html>
