<!DOCTYPE html>
<html>
<head><title>Worker Test</title></head>
<body>
<h2>Terminal Worker Test</h2>
<pre id="log"></pre>
<script>
const log = document.getElementById('log');
function addLog(msg) {
  log.textContent += msg + '\n';
  console.log(msg);
}

addLog('Creating worker...');
try {
  const w = new Worker('/js/terminal-worker.js');
  addLog('Worker created');
  w.onmessage = (e) => {
    addLog('Message: ' + JSON.stringify(e.data));
  };
  w.onerror = (e) => {
    addLog('Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno);
  };
  setTimeout(() => {
    addLog('Sending init...');
    w.postMessage({ type: 'init', sessionId: 'test-1', cols: 80, rows: 24 });
  }, 500);
  setTimeout(() => {
    addLog('Sending data...');
    w.postMessage({ type: 'data', sessionId: 'test-1', data: 'Hello World\r\n' });
  }, 1000);
  setTimeout(() => {
    addLog('Sending ping...');
    w.postMessage({ type: 'ping' });
  }, 1500);
} catch (e) {
  addLog('Failed to create worker: ' + e.message);
}
</script>
</body>
</html>
