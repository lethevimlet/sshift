<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Test - No SSH</title>
  <link rel="stylesheet" href="/libs/xterm/xterm.css">
  <style>
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      margin: 0;
    }
    h1 {
      color: #c10059;
      margin-bottom: 20px;
    }
    .info {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .status {
      font-family: monospace;
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 4px;
    }
    .success { background: #238636; }
    .error { background: #da3633; }
    .warning { background: #d29922; }
    #terminal-container {
      width: 100%;
      height: 400px;
      border: 2px solid #c10059;
      border-radius: 8px;
      background: #0d1117;
    }
    #log {
      margin-top: 20px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      font-family: monospace;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>🚀 SSHIFT Terminal Test (No SSH)</h1>
  
  <div class="info">
    <p>This page tests the terminal rendering without requiring an SSH connection.</p>
    <p>If you can see the terminal below and type in it, the terminal is working correctly.</p>
  </div>

  <div id="status"></div>
  
  <div id="terminal-container"></div>
  
  <div id="log"></div>

  <script src="/libs/xterm/xterm.js"></script>
  <script src="/libs/xterm/xterm-addon-fit.js"></script>
  
  <script>
    // Normalize addon exports
    (function() {
      if (typeof window.Terminal === 'object' && window.Terminal && window.Terminal.Terminal) {
        window.Terminal = window.Terminal.Terminal;
      }
      if (typeof window.FitAddon === 'object' && window.FitAddon && window.FitAddon.FitAddon) {
        window.FitAddon = window.FitAddon.FitAddon;
      }
    })();
  </script>
  
  <script>
    const log = document.getElementById('log');
    const status = document.getElementById('status');
    
    function addStatus(message, type = 'info') {
      const div = document.createElement('div');
      div.className = 'status ' + type;
      div.textContent = message;
      status.appendChild(div);
    }
    
    function addLog(message) {
      const div = document.createElement('div');
      div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }
    
    // Capture errors
    window.onerror = function(msg, url, line, col, error) {
      addStatus(`Error: ${msg}`, 'error');
      addLog(`ERROR: ${msg} at ${url}:${line}:${col}`);
      return false;
    };
    
    window.addEventListener('load', () => {
      addLog('Page loaded');
      
      try {
        // Check libraries
        if (typeof window.Terminal === 'undefined') {
          addStatus('✗ Terminal not loaded', 'error');
          addLog('ERROR: Terminal class not defined');
          return;
        }
        
        const terminalType = typeof window.Terminal;
        addLog(`Terminal type: ${terminalType}`);
        
        if (terminalType !== 'function') {
          addStatus(`✗ Terminal is ${terminalType}, not a function`, 'error');
          addLog(`ERROR: Terminal is ${terminalType}`);
          return;
        }
        
        addStatus('✓ Terminal class loaded', 'success');
        addLog('Terminal class is a function');
        
        if (typeof window.FitAddon === 'undefined') {
          addStatus('✗ FitAddon not loaded', 'error');
          addLog('ERROR: FitAddon class not defined');
          return;
        }
        
        const fitAddonType = typeof window.FitAddon;
        addLog(`FitAddon type: ${fitAddonType}`);
        
        if (fitAddonType !== 'function') {
          addStatus(`✗ FitAddon is ${fitAddonType}, not a function`, 'error');
          addLog(`ERROR: FitAddon is ${fitAddonType}`);
          return;
        }
        
        addStatus('✓ FitAddon class loaded', 'success');
        addLog('FitAddon class is a function');
        
        // Get container
        const container = document.getElementById('terminal-container');
        const rect = container.getBoundingClientRect();
        addLog(`Container dimensions: ${rect.width}x${rect.height}px`);
        
        if (rect.width === 0 || rect.height === 0) {
          addStatus('✗ Container has zero dimensions', 'error');
          addLog('ERROR: Container dimensions are zero');
          return;
        }
        
        addStatus(`✓ Container ready (${Math.round(rect.width)}x${Math.round(rect.height)}px)`, 'success');
        
        // Create terminal
        addLog('Creating terminal instance...');
        const terminal = new window.Terminal({
          theme: {
            background: '#0d1117',
            foreground: '#e6edf3',
            cursor: '#c10059',
            cursorAccent: '#0d1117',
            selection: 'rgba(193, 0, 89, 0.3)',
            magenta: '#c10059',
            brightMagenta: '#c10059'
          },
          fontFamily: "'JetBrains Mono', 'Fira Code', 'Consolas', monospace",
          fontSize: 14,
          cursorBlink: true,
          cursorStyle: 'block'
        });
        
        addStatus('✓ Terminal instance created', 'success');
        addLog('Terminal instance created successfully');
        
        // Create and load FitAddon
        addLog('Creating FitAddon...');
        const fitAddon = new window.FitAddon();
        terminal.loadAddon(fitAddon);
        addLog('FitAddon loaded');
        
        // Open terminal
        addLog('Opening terminal in container...');
        terminal.open(container);
        addStatus('✓ Terminal opened', 'success');
        addLog('Terminal opened in container');
        
        // Fit terminal
        addLog('Fitting terminal...');
        requestAnimationFrame(() => {
          setTimeout(() => {
            try {
              fitAddon.fit();
              addStatus(`✓ Terminal fitted (${terminal.cols} cols x ${terminal.rows} rows)`, 'success');
              addLog(`Terminal fitted: ${terminal.cols} cols x ${terminal.rows} rows`);
              
              // Write welcome message
              terminal.writeln('\x1b[35m╔════════════════════════════════════════════════════════════╗\x1b[0m');
              terminal.writeln('\x1b[35m║\x1b[0m          \x1b[1;35mSSHIFT Terminal Test\x1b[0m                          \x1b[35m║\x1b[0m');
              terminal.writeln('\x1b[35m╚════════════════════════════════════════════════════════════╝\x1b[0m');
              terminal.writeln('');
              terminal.writeln('\x1b[32m✓ Terminal is working correctly!\x1b[0m');
              terminal.writeln('');
              terminal.writeln('This is a local test terminal (no SSH connection).');
              terminal.writeln('Type something to test input:');
              terminal.writeln('');
              terminal.write('\x1b[1;35m$\x1b[0m ');
              
              // Handle input
              let line = '';
              terminal.onData((data) => {
                if (data === '\r') {
                  terminal.writeln('');
                  if (line.trim() === 'clear') {
                    terminal.clear();
                    terminal.write('\x1b[1;35m$\x1b[0m ');
                  } else if (line.trim() === 'help') {
                    terminal.writeln('\x1b[36mAvailable commands:\x1b[0m');
                    terminal.writeln('  \x1b[33mclear\x1b[0m  - Clear the terminal');
                    terminal.writeln('  \x1b[33mhelp\x1b[0m   - Show this help message');
                    terminal.writeln('  \x1b[33mdate\x1b[0m   - Show current date/time');
                    terminal.writeln('  \x1b[33mecho\x1b[0m   - Echo text (type: echo <text>)');
                    terminal.write('\x1b[1;35m$\x1b[0m ');
                  } else if (line.trim().startsWith('echo ')) {
                    terminal.writeln(line.substring(5));
                    terminal.write('\x1b[1;35m$\x1b[0m ');
                  } else if (line.trim() === 'date') {
                    terminal.writeln(new Date().toString());
                    terminal.write('\x1b[1;35m$\x1b[0m ');
                  } else if (line.trim()) {
                    terminal.writeln(`\x1b[33mCommand not found: ${line}\x1b[0m`);
                    terminal.writeln('Type \x1b[33mhelp\x1b[0m for available commands');
                    terminal.write('\x1b[1;35m$\x1b[0m ');
                  } else {
                    terminal.write('\x1b[1;35m$\x1b[0m ');
                  }
                  line = '';
                } else if (data === '\x7f') {
                  // Backspace
                  if (line.length > 0) {
                    line = line.slice(0, -1);
                    terminal.write('\b \b');
                  }
                } else if (data === '\x1b[A') {
                  // Up arrow - ignore
                } else if (data === '\x1b[B') {
                  // Down arrow - ignore
                } else {
                  line += data;
                  terminal.write(data);
                }
              });
              
              addStatus('✓ Terminal ready - try typing!', 'success');
              addLog('Terminal test complete - ready for input');
              
            } catch (e) {
              addStatus(`✗ Fit failed: ${e.message}`, 'error');
              addLog(`ERROR: Fit failed - ${e.message}`);
              addLog(e.stack);
            }
          }, 100);
        });
        
      } catch (error) {
        addStatus(`✗ Error: ${error.message}`, 'error');
        addLog(`ERROR: ${error.message}`);
        addLog(error.stack);
      }
    });
  </script>
</body>
</html>
