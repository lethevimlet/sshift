name: Publish Docker Image

on:
  workflow_run:
    workflows: ["Publish to npm"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.2.0 or leave empty to use package.json)'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Run if: 1) workflow_run completed successfully, or 2) manually triggered
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version
        id: package_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.package_version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.package_version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          cache: type=gha
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}

  cleanup:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      packages: write
    steps:
      - name: Keep only 5 most recent package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          PKG=$(echo "${{ github.repository }}" | sed 's|.*/||' | tr '[:upper:]' '[:lower:]')
          KEEP=5

          # Determine API base path (org vs user)
          if gh api "/orgs/$OWNER" --silent 2>/dev/null; then
            API_BASE="/orgs/$OWNER"
          else
            API_BASE="/user"
          fi

          # Fetch package version IDs sorted by creation date (newest first)
          mapfile -t IDS < <(gh api -H "Accept: application/vnd.github+json" \
            "$API_BASE/packages/container/$PKG/versions?per_page=100" \
            --jq 'sort_by(.created_at) | reverse | .[].id')

          TOTAL=${#IDS[@]}
          echo "Found $TOTAL package versions"

          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "Only $TOTAL versions found, no cleanup needed"
            exit 0
          fi

          DELETED=0
          for ((i=KEEP; i<TOTAL; i++)); do
            ID="${IDS[$i]}"
            echo "Deleting package version $ID..."
            if gh api -X DELETE "$API_BASE/packages/container/$PKG/versions/$ID" --silent; then
              DELETED=$((DELETED + 1))
            else
              echo "Warning: failed to delete version $ID"
            fi
          done

          echo "Cleanup complete: kept $KEEP most recent, deleted $DELETED old versions"